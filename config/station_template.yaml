# Snow Depth Sensor Station Configuration Template (prompt schema)

station:
  id: "DAVIES-01"
  sensor_height_cm: 200.0

pins:
  hcsr04_trigger: 23
  hcsr04_echo: 24
  hcsr04_power: 27
  ds18b20_data: 4
  ds18b20_power: 17
  lora_cs: 1
  lora_reset: 25
  # Reserved for future interrupt-driven LoRa receive support.
  # Current code path uses polling, so this pin is not required today.
  lora_irq: 22

lora:
  frequency: 915.0
  tx_power: 23
  timeout_seconds: 10
  retry_count: 3

storage:
  ssd_mount_path: "/mnt/ssd"
  csv_filename: "snow_data.csv"

timing:
  cycle_interval_minutes: 15
  sensor_stabilization_seconds: 2
  hcsr04_num_readings: 5
